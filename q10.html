<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Question 10</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #e0e0e0; 
            padding: 20px; 
        }
        .form-container { 
            border: 1px solid #999; 
            padding: 20px; 
            background-color: #e0e0e0; 
            width: 650px; 
            margin: auto; 
            position: relative; 
        }
        .main-title { 
            position: absolute; 
            top: -12px; left: 50%; 
            transform: translateX(-50%); 
            background-color: #e0e0e0; 
            padding: 0 10px; 
            font-weight: bold; 
            font-size: 1.1em; 
        }
        fieldset { 
            border: 1px solid #999; 
            margin-bottom: 15px; 
            padding: 15px; 
            position: relative; 
        }
        legend { 
            font-weight: bold; 
        }
        .form-row { display: flex; 
            justify-content: space-between;
            margin-bottom: 10px; 
        }
        .form-group { 
            width: 48%; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
        }
        .form-group label { 
            width: 35%; 
            font-size: 0.9em; 
        }
        .form-group input, .form-group select { 
            width: 60%; 
            padding: 4px; 
            box-sizing: border-box; 
        }
        .inline-group { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            font-size: 0.9em; 
            margin-bottom: 10px; 
        }
        .meat-row { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-size: 0.9em; 
            margin-top: 10px; 
        }
        textarea { 
            width: 40%; 
            height: 50px; 
            resize: none; 
        }
        .buttons { 
            margin-top: 15px; 
        }
        button { 
            padding: 5px 15px; 
            margin-right: 10px; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="main-title">PIZZA ORDER FORM</div>
    
    <form id="pizzaForm" onsubmit="return validatePizzaOrder(event)">
        
        <fieldset>
            <legend>Delivery Address</legend> 
            <div class="form-row">
                <div class="form-group">
                    <label for="fullName">Full Name:</label> 
                    <input type="text" id="fullName" placeholder="Full Name"> 
                </div>
                <div class="form-group">
                    <label for="streetAddress">Stree Address:</label>
                    <input type="text" id="streetAddress" placeholder="Address"> 
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="phone">Phone:</label> 
                    <input type="text" id="phone" placeholder="Phone"> 
                </div>
                <div class="form-group">
                    <label for="email">Email:</label> 
                    <input type="text" id="email" placeholder="Email"> 
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="password">Password</label> 
                    <input type="password" id="password" placeholder="Password"> 
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend>Payment Information</legend> 
            <div class="form-row">
                <div class="form-group">
                    <label for="cardType">Card Type:</label> 
                    <select id="cardType">
                        <option value="">Select Card</option>
                        <option value="Visa">Visa</option> 
                        <option value="Mastercard">Mastercard</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="cardNumber">Card Number:</label> 
                    <input type="text" id="cardNumber" placeholder="Card Number"> 
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="cardName">Name on Card:</label> 
                    <input type="text" id="cardName" placeholder="Name"> 
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend>Customize Your Pizza</legend> 
            <div class="form-row">
                <div class="form-group">
                    <label for="pizzaSize">Pizza size :</label> 
                    <select id="pizzaSize">
                        <option value="">Select Size</option>
                        <option value="small">small</option>
                        <option value="medium">medium</option>
                        <option value="large" selected>large</option> 
                    </select>
                </div>
                <div class="form-group">
                    <label for="quantity">Quantity:</label> 
                    <input type="text" id="quantity">
                </div>
            </div>
            
            <div class="inline-group">
                <label>Spices :</label> 
                <label><input type="checkbox" name="spices" value="Black pepper"> Black pepper</label> 
                <label><input type="checkbox" name="spices" value="Bell peppers"> Bell peppers</label> 
                <label><input type="checkbox" name="spices" value="mayonnaise"> mayonnaise</label> 
            </div>

            <div class="form-row" style="align-items: flex-start;">
                <label for="otherRequirements" style="font-size: 0.9em; width: 22%;">Other Requirements:</label> 
                <textarea id="otherRequirements" placeholder="Any Other Requirements"></textarea> 
                
                <div class="meat-row" style="margin-top: 0; width: 35%;">
                    <label>Meat</label> 
                    <label><input type="radio" name="meat" value="Fish"> Fish</label> 
                    <label><input type="radio" name="meat" value="Cow"> Cow</label> 
                    <label><input type="radio" name="meat" value="Chicken"> Chicken</label> 
                </div>
            </div>
        </fieldset>

        <div class="buttons">
            <button type="reset" id="clearOrder">Clear Order</button> 
            <button type="submit" id="placeOrder">Place Order</button> 
        </div>
    </form>
</div>
<script>
    function validatePizzaOrder(event) {

    const fullName = document.getElementById('fullName').value.trim();
    const streetAddress = document.getElementById('streetAddress').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const cardType = document.getElementById('cardType').value;
    const cardNumber = document.getElementById('cardNumber').value.trim();
    const cardName = document.getElementById('cardName').value.trim();
    const pizzaSize = document.getElementById('pizzaSize').value;
    const quantity = document.getElementById('quantity').value.trim();

    const selectedSpicesCount = document.querySelectorAll('input[name="spices"]:checked').length;
    const selectedMeatRadio = document.querySelector('input[name="meat"]:checked');

    if (fullName === "") {
        alert("Validation Failed: Please provide your Full Name."); 
        event.preventDefault();
        return false;
    }

    if (streetAddress === "") {
        alert("Validation Failed: Please provide your Street Address."); 
        event.preventDefault();
        return false;
    }


    const tenDigitRegex = /^\d{10}$/;
    if (!tenDigitRegex.test(phone)) {
        alert("Validation Failed: Phone number must be exactly 10 numerical digits."); 
        event.preventDefault();
        return false;
    }

    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
        alert("Validation Failed: Please provide a valid Email Address."); 
        event.preventDefault();
        return false;
    }


    if (password.length < 5 || password.length > 15) {
        alert("Validation Failed: Password must be between 5 and 15 characters long."); 
        event.preventDefault();
        return false;
    }


    if (cardType === "") {
        alert("Validation Failed: Please select a valid Card Type."); 
        event.preventDefault();
        return false;
    }


    if (cardNumber === "" || isNaN(cardNumber)) {
        alert("Validation Failed: Please provide a valid numerical Card Number."); 
        event.preventDefault();
        return false;
    }

    if (cardName === "") {
        alert("Validation Failed: Please provide the Card Name."); 
        event.preventDefault();
        return false;
    }

    if (selectedSpicesCount === 0) {
        alert("Validation Failed: You must check at least one Spice preference."); 
        event.preventDefault();
        return false;
    }

    if (pizzaSize === "") {
        alert("Validation Failed: Please select a Pizza Size.");
        event.preventDefault();
        return false;
    }

    if (quantity === "" || isNaN(quantity) || parseInt(quantity) <= 0) {
        alert("Validation Failed: Please provide a valid numerical quantity greater than 0."); 
        event.preventDefault();
        return false;
    }

    if (!selectedMeatRadio) {
        alert("Validation Failed: Please select one of the listed options for meat."); 
        event.preventDefault();
        return false;
    }

   
    alert("Success: Your pizza order form validation has passed successfully!");
    return true;
}
</script>
    </body>
</html>

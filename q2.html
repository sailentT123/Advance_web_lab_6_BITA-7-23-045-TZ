<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Question 2</title>
    </head>
    <body>
        <label for="num1">1st Number:</label>
        <input type="text" id="num1" name="num1"><br>
        <label for="num2">2nd Number:</label>
        <input type="text" id="num2" name="num2"><br>
        <button type="button" id="multiplyBtn" onclick="submitForm()">Multiply</button>
        <button type="button" id="divideBtn" onclick="submitForm()">Divide</button><br>
        <p>the result is: <span id="result"></span></p>
        <script>
            function submitForm() {
                const num1 = parseFloat(document.getElementById('num1').value);
                const num2 = parseFloat(document.getElementById('num2').value);
                if (isNaN(num1) || isNaN(num2)) {
                    alert('Please enter valid numbers.');
                    return;
                }
                if (event.target.id === 'multiplyBtn') {
                    multiply(num1, num2);
                } else if (event.target.id === 'divideBtn') {
                    divide(num1, num2);
                }
            }
            function multiply(num1, num2) {
                 if (num2 === 0 || num2 === 0.0) {
                    alert('Cannot multiply by zero.');
                    return;
                }
                const result = num1 * num2;
                document.getElementById('result').textContent = result;
            }
            function divide(num1, num2) {
                if (num2 === 0 || num2 === 0.0) {
                    alert('Cannot divide by zero.');
                    return;
                }
                const result = num1 / num2;
                document.getElementById('result').textContent = result;
            }
        </script>
    </body>
</html>
